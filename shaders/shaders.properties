# --- Buffer sizes (docs/01 section 3) ---
size.buffer.colortex4 = 0.5 0.5

# --- Options screen: domain groups ---
screen = [Lighting] [Water] [ColorExposure] [Performance]
screen.columns = 2

screen.Lighting = SUN_INTENSITY TORCH_INTENSITY AO_STRENGTH VOL_STRENGTH
screen.Water = WAVE_HEIGHT REFRACT_STRENGTH CAUSTICS UW_FOG_DENSITY
screen.ColorExposure = EXPOSURE_COMP BLOOM_INTENSITY DAYNIGHT_GRADE
screen.Performance = QUALITY_TIER DEBUG_BUFFER

sliders = QUALITY_TIER DEBUG_BUFFER SUN_INTENSITY TORCH_INTENSITY EXPOSURE_COMP WAVE_HEIGHT REFRACT_STRENGTH BLOOM_INTENSITY UW_FOG_DENSITY AO_STRENGTH DAYNIGHT_GRADE VOL_STRENGTH
