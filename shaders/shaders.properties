#===================================================================
# Lumen — shaders.properties
# Pipeline configuration + options screen. Grouped by domain
# (docs/01 section 6): the player thinks "how bright is the moon",
# not "deferred1 volumetric steps".
#
# Phase 0 exposes only the two skeleton-level controls (quality tier
# and the debug buffer viewer). The Lighting / Water / Color pages are
# populated as their features land in Phases 1-4.
#===================================================================

# --- Buffer sizes (docs/01 section 3) -----------------------------
# Half-resolution sky-view LUT and volumetric accumulation buffers.
size.buffer.colortex4 = 0.5 0.5
size.buffer.colortex6 = 0.5 0.5

# --- Options screen ------------------------------------------------
screen = QUALITY_TIER DEBUG_BUFFER
sliders = QUALITY_TIER DEBUG_BUFFER

# --- Pipeline feature flags (Iris defaults; documented for clarity)-
# Concurrent compute is left off unless a measured case justifies it
# (docs/01 section 5).
# allowConcurrentCompute = false
